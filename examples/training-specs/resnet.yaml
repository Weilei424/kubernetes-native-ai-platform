# examples/training-specs/resnet.yaml
# Training job spec for the platform demo (DEMO_MODE=fast uses minimal-trainer image).
# Adjust image tag to platform/resnet50-exporter:latest for DEMO_MODE=full.
#
# IMPORTANT: project_id must be a UUID, not a name.
# The demo script patches this field automatically from $PROJECT_ID.
# To get your project UUID after seeding:
#   export PROJECT_ID=$(kubectl exec -n aiplatform deploy/postgres -- \
#     psql -U aiplatform aiplatform -t -A \
#     -c "SELECT id FROM projects WHERE name='vision-demo' LIMIT 1")
#
# Submit with:
#   platformctl train submit -f examples/training-specs/resnet.yaml
name: resnet50-train-v1
project_id: REPLACE_WITH_PROJECT_UUID

runtime:
  image: platform/minimal-trainer:latest
  command: []
  args: []
  env:
    MLFLOW_TRACKING_URI: http://mlflow.aiplatform.svc.cluster.local:5000
    MINIO_ENDPOINT: http://minio.aiplatform.svc.cluster.local:9000
    MINIO_ACCESS_KEY: minio
    MINIO_SECRET_KEY: minio123
    MINIO_BUCKET: models
    NUM_WORKERS: "2"

resources:
  num_workers: 2
  worker_cpu: "1"
  worker_memory: "2Gi"
  head_cpu: "1"
  head_memory: "2Gi"
